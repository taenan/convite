	<script>
window.addEventListener('load', () => {

    const audio = document.getElementById('musicaAudio');
    const botao = document.getElementById('musicToggle');
    const icon = botao.querySelector('i');

    function atualizarIcone() {
        if (audio.paused || audio.muted) {
            icon.className = 'fa-solid fa-volume-xmark';
            botao.classList.add('muted');
        } else {
            icon.className = 'fa-solid fa-volume-high';
            botao.classList.remove('muted');
        }
    }

    audio.play().then(() => {
        audio.muted = false;
        atualizarIcone();
    }).catch(() => {
        atualizarIcone();
    });

    botao.addEventListener('click', () => {

        if (audio.paused || audio.muted) {
            audio.muted = false;
            audio.play();
        } else {
            audio.muted = true;
        }

        atualizarIcone();
    });

    document.addEventListener('click', () => {
        if (audio.paused) {
            audio.muted = false;
            audio.play();
            atualizarIcone();
        }
    }, { once: true });

});
</script>
